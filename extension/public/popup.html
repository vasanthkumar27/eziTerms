<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EziTerms</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 0;
        width: 300px;
        min-height: 180px;
        background: #000;
        color: #ededed;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }
      .popup-inner {
        padding: 20px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .logo-wrap {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .logo-wrap img {
        width: 24px;
        height: 24px;
      }
      .header-text h1 {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #fff;
        line-height: 1.2;
      }
      .header-text span {
        font-size: 11px;
        color: #888;
        font-weight: 500;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      .toggle-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .toggle-card:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.1);
      }
      .toggle-label {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .toggle-label strong {
        font-size: 14px;
        font-weight: 600;
        color: #ededed;
      }
      .toggle-label span {
        font-size: 11px;
        color: #888;
      }
      .switch {
        width: 48px;
        height: 28px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        cursor: pointer;
        position: relative;
        transition: all 0.15s ease;
        flex-shrink: 0;
      }
      .switch.on {
        background: #fff;
        border-color: #fff;
      }
      .switch::after {
        content: '';
        position: absolute;
        top: 3px;
        left: 3px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #888;
        transition: all 0.15s ease;
      }
      .switch.on::after {
        left: 23px;
        background: #000;
      }
      .switch:active::after { width: 22px; }
      .open-btn {
        width: 100%;
        padding: 14px 20px;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: -0.01em;
        transition: all 0.15s ease;
      }
      .open-btn:hover {
        opacity: 0.9;
      }
      .open-btn:active {
        transform: scale(0.98);
      }
      .open-btn:focus-visible {
        outline: 2px solid rgba(50, 145, 255, 0.6);
        outline-offset: 2px;
      }
      #toggle:focus-visible {
        outline: 2px solid rgba(50, 145, 255, 0.5);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div class="popup-inner">
      <header class="header">
        <div class="logo-wrap">
          <img id="logo-img" src="assets/Eziterms-Logo-icon-dark theme.png" alt="EziTerms" />
        </div>
        <div class="header-text">
          <h1>EziTerms</h1>
          <span>Terms &amp; risk</span>
        </div>
      </header>
      <div class="toggle-card">
        <div class="toggle-label">
          <strong>Extension</strong>
          <span id="status-text">On</span>
        </div>
        <div id="toggle" class="switch on" role="switch" aria-label="Toggle extension" tabindex="0"></div>
      </div>
      <button id="open-btn" class="open-btn">Open EziTerms</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
